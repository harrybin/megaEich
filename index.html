<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaEich — Mega Eichhörnchen Arcade</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="wrapper">
        <div id="game-shell">
            <canvas id="gameCanvas" width="800" height="500"></canvas>
        </div>
        <div id="utility-bar">
            <button id="fullscreen-btn" type="button" aria-label="Toggle fullscreen" aria-pressed="false">
                Fullscreen
            </button>
        </div>
        <div id="mobile-controls" aria-label="Touch controls" role="group">
            <div class="touch-pad" aria-label="Movement controls">
                <button class="touch-btn" data-touch-key="ArrowLeft" aria-label="Move left">◀</button>
                <button class="touch-btn" data-touch-key="ArrowRight" aria-label="Move right">▶</button>
            </div>
            <div class="touch-middle" aria-label="Fullscreen controls">
                <button id="fullscreen-inline-btn" class="touch-btn touch-btn-back" type="button"
                    aria-label="Exit fullscreen" hidden>
                    Back
                </button>
            </div>
            <div class="touch-actions" aria-label="Action controls">
                <button class="touch-btn touch-btn-jump" data-touch-key="Space" aria-label="Jump">JUMP</button>
            </div>
        </div>
        <div id="controls-hint">
            ← → &nbsp;/&nbsp; A D &nbsp;·&nbsp; Move &nbsp;|&nbsp;
            SPACE &nbsp;/&nbsp; ↑ &nbsp;/&nbsp; W &nbsp;·&nbsp; Jump &nbsp;|&nbsp;
            P &nbsp;/&nbsp; ESC &nbsp;·&nbsp; Pause
        </div>
        <div id="mobile-controls-hint">
            Touch buttons: Move, Jump
        </div>
    </div>
    <audio id="bgMusic" loop>
        <source src="assets/Mega Eichhörnchen .mp3" type="audio/mpeg">
    </audio>
    <script src="game-config.js"></script>
    <script src="levels.js"></script>
    <!-- Runtime entry point -->
    <script src="game.js"></script>
</body>

</html>
